<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 My Todo List</h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <main>
            <!-- Input Section -->
            <div class="input-section">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="todoInput" 
                        class="todo-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">Add Task</button>
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
            </div>

            <!-- Stats Section -->
            <div class="stats">
                <span class="stat-item">
                    <strong id="totalTasks">0</strong> Total
                </span>
                <span class="stat-item">
                    <strong id="activeTasks">0</strong> Active
                </span>
                <span class="stat-item">
                    <strong id="completedTasks">0</strong> Completed
                </span>
            </div>

            <!-- Todo List Section -->
            <section class="todo-section">
                <div id="todoList" class="todo-list">
                    <div class="empty-state">
                        <p>🎉 No tasks yet. Add one to get started!</p>
                    </div>
                </div>
            </section>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button id="clearCompletedBtn" class="clear-btn">
                    Clear Completed
                </button>
                <button id="clearAllBtn" class="clear-all-btn">
                    Clear All
                </button>
            </div>
        </main>

        <footer>
            <p>Built with ❤️ | Local Storage Todo App</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
